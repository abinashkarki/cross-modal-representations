name: Release Hygiene

on:
  push:
  pull_request:

jobs:
  release-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Release guardrail check
        run: python src/release_checks.py
